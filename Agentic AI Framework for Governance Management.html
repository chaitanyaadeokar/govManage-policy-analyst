<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agentic AI Framework for Governance Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #f4f6f9;
}

header {
    background: #1e3a8a;
    color: white;
    padding: 15px;
    font-size: 20px;
}

.container {
    display: flex;
}

.sidebar {
    width: 250px;
    background: #111827;
    color: white;
    height: 100vh;
    padding-top: 20px;
}

.sidebar button {
    width: 100%;
    padding: 12px;
    border: none;
    background: none;
    color: white;
    text-align: left;
    cursor: pointer;
}

.sidebar button:hover {
    background: #2563eb;
}

.content {
    flex: 1;
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 6px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: left;
}

th {
    background: #2563eb;
    color: white;
}

button.primary {
    background: #2563eb;
    color: white;
    padding: 8px 12px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

button.primary:hover {
    background: #1e40af;
}

.kpi {
    display: inline-block;
    width: 22%;
    margin: 1%;
    padding: 15px;
    background: #2563eb;
    color: white;
    border-radius: 6px;
    text-align: center;
}
</style>
</head>
<body>

<header>
Agentic AI Framework for Governance Management
</header>

<div class="container">

<div class="sidebar">
    <button onclick="showSection('dashboard')">Dashboard</button>
    <button onclick="showSection('masters')">Masters</button>
    <button onclick="showSection('transactions')">Transactions</button>
    <button onclick="showSection('reports')">Reports</button>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboard" class="section">
    <div class="card">
        <h3>Governance KPIs</h3>
        <div class="kpi">Policies Active<br><b id="policyCount"></b></div>
        <div class="kpi">Compliance %<br><b>82%</b></div>
        <div class="kpi">Citizen Satisfaction<br><b>74%</b></div>
        <div class="kpi">Risk Index<br><b>63/100</b></div>
    </div>

    <div class="card">
        <h3>AI Governance Analysis</h3>
        <button class="primary" onclick="runAIAnalysis()">Analyze Governance Health</button>
        <div id="aiOutput"></div>
    </div>
</div>

<!-- MASTERS -->
<div id="masters" class="section" style="display:none">
    <div class="card">
        <h3>Policy Masters</h3>
        <table>
            <thead>
                <tr>
                    <th>Policy ID</th>
                    <th>Name</th>
                    <th>Sector</th>
                    <th>Risk Level</th>
                </tr>
            </thead>
            <tbody id="policyTable"></tbody>
        </table>
    </div>
</div>

<!-- TRANSACTIONS -->
<div id="transactions" class="section" style="display:none">
    <div class="card">
        <h3>Governance Actions</h3>
        <table>
            <thead>
                <tr>
                    <th>Action ID</th>
                    <th>Policy</th>
                    <th>Department</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="actionTable"></tbody>
        </table>
    </div>
</div>

<!-- REPORTS -->
<div id="reports" class="section" style="display:none">
    <div class="card">
        <h3>Governance Risk Report</h3>
        <button class="primary" onclick="generateReport()">Generate AI Risk Report</button>
        <div id="reportOutput"></div>
    </div>
</div>

</div>
</div>

<script>

const policies = [
    {id: "P001", name: "Digital Privacy Act", sector: "Technology", risk: "Medium"},
    {id: "P002", name: "Green Infrastructure Policy", sector: "Environment", risk: "Low"},
    {id: "P003", name: "Healthcare Access Reform", sector: "Health", risk: "High"},
    {id: "P004", name: "Public Data Transparency Act", sector: "Governance", risk: "Medium"}
];

const actions = [
    {id: "A101", policy: "Digital Privacy Act", dept: "IT Ministry", status: "In Progress"},
    {id: "A102", policy: "Healthcare Access Reform", dept: "Health Dept", status: "Pending"},
    {id: "A103", policy: "Green Infrastructure Policy", dept: "Environment Dept", status: "Completed"}
];

function loadData() {
    document.getElementById("policyCount").innerText = policies.length;

    let policyHTML = "";
    policies.forEach(p => {
        policyHTML += `<tr>
            <td>${p.id}</td>
            <td>${p.name}</td>
            <td>${p.sector}</td>
            <td>${p.risk}</td>
        </tr>`;
    });
    document.getElementById("policyTable").innerHTML = policyHTML;

    let actionHTML = "";
    actions.forEach(a => {
        actionHTML += `<tr>
            <td>${a.id}</td>
            <td>${a.policy}</td>
            <td>${a.dept}</td>
            <td>${a.status}</td>
        </tr>`;
    });
    document.getElementById("actionTable").innerHTML = actionHTML;
}

function showSection(sectionId) {
    document.querySelectorAll(".section").forEach(sec => sec.style.display = "none");
    document.getElementById(sectionId).style.display = "block";
}

function runAIAnalysis() {

    let output = `
    <table>
        <tr><th>Metric</th><th>Assessment</th></tr>
        <tr><td>Governance Risk Score</td><td>63 / 100</td></tr>
        <tr><td>Strength Areas</td><td>Transparency, Sustainability</td></tr>
        <tr><td>Weakness Areas</td><td>Timeliness, Risk Monitoring</td></tr>
        <tr><td>Compliance Gaps</td><td>Healthcare policy audit overdue</td></tr>
        <tr><td>Strategic Recommendations</td><td>Implement AI-based monitoring agents</td></tr>
        <tr><td>Agentic Intervention</td><td>Deploy Compliance Agent + Risk Agent</td></tr>
    </table>
    `;

    document.getElementById("aiOutput").innerHTML = output;
}

function generateReport() {

    let report = `
    <h4>AI Governance Risk Summary</h4>
    <table>
        <tr><th>Policy</th><th>Risk Level</th><th>AI Recommendation</th></tr>
        <tr><td>Healthcare Access Reform</td><td>High</td><td>Immediate compliance audit</td></tr>
        <tr><td>Digital Privacy Act</td><td>Medium</td><td>Enhance data encryption standards</td></tr>
        <tr><td>Green Infrastructure Policy</td><td>Low</td><td>Scale implementation nationwide</td></tr>
    </table>
    `;

    document.getElementById("reportOutput").innerHTML = report;
}

loadData();

</script>

</body>
</html>
